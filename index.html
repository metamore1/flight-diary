<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал нальоту · А1-СМ Фурія</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2330;
    --line: #2a3441;
    --amber: #ffb627;
    --green: #3fb950;
    --green-dim: #1f6f3a;
    --txt: #e6edf3;
    --txt-dim: #8b98a8;
    --red: #f85149;
    --blue: #388bfd;
    --mono: 'JetBrains Mono', 'Courier New', ui-monospace, monospace;
    --sans: 'Segoe UI', system-ui, sans-serif;
  }
  body {
    background:
      radial-gradient(circle at 20% 0%, #11202b 0%, transparent 45%),
      radial-gradient(circle at 90% 100%, #1a1505 0%, transparent 40%),
      var(--bg);
    color: var(--txt);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 20px 16px 60px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }

  header {
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px; margin-bottom: 24px;
  }
  .badge {
    width: 46px; height: 46px; flex-shrink: 0;
    border: 1.5px solid var(--amber);
    border-radius: 8px;
    display: grid; place-items: center;
    color: var(--amber); font-family: var(--mono); font-weight: 700; font-size: 13px;
    background: rgba(255,182,39,0.06); text-align: center; line-height: 1.1;
  }
  header h1 { font-size: 19px; letter-spacing: 0.5px; font-weight: 600; }
  header .sub { color: var(--txt-dim); font-size: 12px; font-family: var(--mono); margin-top: 2px; letter-spacing: 1px; }

  .card {
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 140%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 22px;
  }
  .card-title {
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
    color: var(--txt-dim); text-transform: uppercase; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .field { flex: 1; min-width: 130px; }
  .field label { display: block; font-size: 11px; color: var(--txt-dim); margin-bottom: 6px; font-family: var(--mono); letter-spacing: 0.5px; }
  input, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--line);
    border-radius: 8px; padding: 11px 12px; color: var(--txt);
    font-family: var(--mono); font-size: 15px; outline: none; transition: border-color .15s;
  }
  input:focus, textarea:focus { border-color: var(--amber); }
  textarea { font-family: var(--sans); font-size: 14px; resize: vertical; min-height: 44px; }
  .field.full { flex-basis: 100%; }

  .btn {
    background: var(--green-dim); color: var(--txt); border: 1px solid var(--green);
    border-radius: 8px; padding: 12px 22px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: var(--sans); transition: background .15s, transform .05s;
    margin-top: 14px;
  }
  .btn:hover { background: #267a44; }
  .btn:active { transform: translateY(1px); }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 14px; text-align: center; position: relative; overflow: hidden;
  }
  .stat .label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--txt-dim); text-transform: uppercase; }
  .stat .value { font-family: var(--mono); font-size: 26px; font-weight: 700; margin-top: 8px; color: var(--amber); line-height: 1; }
  .stat .value small { font-size: 13px; color: var(--txt-dim); font-weight: 400; }
  .stat.accent .value { color: var(--green); }

  .chart { display: flex; align-items: flex-end; gap: 6px; height: 130px; margin-top: 18px; padding-top: 10px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
  .bar {
    width: 100%; max-width: 38px; background: linear-gradient(180deg, var(--amber), #b87d10);
    border-radius: 4px 4px 0 0; min-height: 2px; transition: height .4s ease; position: relative;
  }
  .bar:hover::after {
    content: attr(data-val) ' хв'; position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    background: var(--bg); border: 1px solid var(--line); padding: 2px 7px; border-radius: 5px;
    font-family: var(--mono); font-size: 11px; white-space: nowrap; color: var(--amber);
  }
  .bar-label { font-family: var(--mono); font-size: 10px; color: var(--txt-dim); }

  .log-item { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--line); }
  .log-item:last-child { border-bottom: none; }
  .log-date { font-family: var(--mono); font-size: 13px; color: var(--txt-dim); width: 92px; flex-shrink: 0; }
  .log-min { font-family: var(--mono); font-size: 15px; color: var(--amber); font-weight: 700; width: 78px; flex-shrink: 0; }
  .log-note { font-size: 13px; color: var(--txt); flex: 1; word-break: break-word; }
  .log-del { background: none; border: none; color: var(--txt-dim); cursor: pointer; font-size: 17px; padding: 4px 8px; border-radius: 6px; flex-shrink: 0; }
  .log-del:hover { color: var(--red); background: rgba(248,81,73,0.1); }

  .empty { text-align: center; color: var(--txt-dim); padding: 30px; font-family: var(--mono); font-size: 13px; }

  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
  .tool-btn {
    flex: 1; min-width: 130px; background: var(--panel-2); color: var(--txt);
    border: 1px solid var(--line); border-radius: 10px; padding: 11px 14px;
    font-size: 13px; cursor: pointer; font-family: var(--mono); transition: border-color .15s, color .15s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .tool-btn:hover { border-color: var(--blue); color: var(--blue); }
  .tool-btn.danger:hover { border-color: var(--red); color: var(--red); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--green-dim); border: 1px solid var(--green); color: var(--txt);
    padding: 11px 20px; border-radius: 10px; font-size: 14px; transition: transform .3s; z-index: 50; max-width: 90%;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { background: #5a1d1a; border-color: var(--red); }

  @media (max-width: 560px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .log-note { flex-basis: 100%; order: 3; margin-left: 104px; margin-top: -6px; }
  }

  /* ---- Екран входу (PIN) ---- */
  .login-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    background:
      radial-gradient(circle at 20% 0%, #11202b 0%, transparent 45%),
      radial-gradient(circle at 90% 100%, #1a1505 0%, transparent 40%),
      var(--bg);
  }
  .login-box {
    width: 100%; max-width: 320px; text-align: center;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 140%);
    border: 1px solid var(--line); border-radius: 16px; padding: 32px 26px;
  }
  .login-box .badge { width: 56px; height: 56px; margin: 0 auto 18px; font-size: 15px; }
  .login-box h2 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  .login-sub { color: var(--txt-dim); font-size: 12px; font-family: var(--mono); letter-spacing: 1px; margin: 6px 0 22px; }
  #pin-input { text-align: center; font-size: 24px; letter-spacing: 8px; padding: 14px; }
  .login-box .btn { width: 100%; margin-top: 16px; }
  .login-err { color: var(--red); font-size: 13px; font-family: var(--mono); min-height: 18px; margin-top: 12px; }

  .hidden { display: none !important; }

  .logout-btn {
    margin-left: auto; background: var(--panel-2); color: var(--txt-dim);
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 14px;
    font-size: 12px; font-family: var(--mono); cursor: pointer; flex-shrink: 0;
    transition: border-color .15s, color .15s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* ---- Синхронізація з файлом ---- */
  .sync-status { font-family: var(--mono); font-size: 13px; line-height: 1.5; margin-bottom: 14px; color: var(--txt-dim); }
  .sync-status b { color: var(--txt); }
  .sync-status .ok { color: var(--green); }
  .sync-status .warn { color: var(--amber); }
  .sync-status .bad { color: var(--red); }
  .sync-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .sync-actions .tool-btn { flex: 1; min-width: 140px; }
  #sync-card.needs-action { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber), 0 0 18px rgba(255,182,39,0.15); }
</style>
</head>
<body>
<!-- ЕКРАН ВХОДУ -->
<div class="login-screen" id="login-screen" style="display:none">
  <div class="login-box">
    <div class="badge">A1<br>СМ</div>
    <h2>Журнал нальоту</h2>
    <div class="login-sub">Введіть PIN для входу</div>
    <input type="password" id="pin-input" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off">
    <button class="btn" id="login-btn">Увійти</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div class="wrap hidden" id="app">
  <header>
    <div class="badge">A1<br>СМ</div>
    <div>
      <h1>Журнал нальоту</h1>
      <div class="sub">FLIGHT TIME LOG · ФУРІЯ</div>
    </div>
    <button class="logout-btn" id="logout-btn">Вийти ⏻</button>
  </header>

  <!-- INPUT -->
  <div class="card">
    <div class="card-title">Новий запис</div>
    <div class="row">
      <div class="field">
        <label>ДАТА</label>
        <input type="date" id="in-date">
      </div>
      <div class="field">
        <label>НАЛІТ, ХВ</label>
        <input type="number" id="in-min" min="0" step="1" placeholder="напр. 85" inputmode="numeric">
      </div>
      <div class="field full">
        <label>ПРИМІТКА (необов'язково)</label>
        <textarea id="in-note" placeholder="борт, маршрут, завдання..."></textarea>
      </div>
    </div>
    <button class="btn" id="add-btn">+ Зберегти наліт</button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="tool-btn" id="export-btn">⭳ Експорт JSON</button>
    <button class="tool-btn" id="import-btn">⭱ Імпорт JSON</button>
    <input type="file" id="import-file" accept=".json,application/json" style="display:none">
    <button class="tool-btn danger" id="reset-btn">✕ Очистити все</button>
  </div>

  <!-- СИНХРОНІЗАЦІЯ З ФАЙЛОМ -->
  <div class="card" id="sync-card">
    <div class="card-title">Синхронізація з файлом</div>
    <div class="sync-status" id="sync-status">…</div>
    <div class="sync-actions">
      <button class="tool-btn" id="sync-open">🔗 Підключити data.json</button>
      <button class="tool-btn" id="sync-new">🆕 Інший файл…</button>
      <button class="tool-btn" id="sync-grant" style="display:none">🔓 Відновити доступ</button>
      <button class="tool-btn danger" id="sync-disconnect" style="display:none">⤓ Відключити</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat accent"><div class="label">Усього</div><div class="value" id="s-total">—</div></div>
    <div class="stat"><div class="label">Польотів</div><div class="value" id="s-count">—</div></div>
    <div class="stat"><div class="label">Цей тиждень</div><div class="value" id="s-week">—</div></div>
    <div class="stat"><div class="label">Середній</div><div class="value" id="s-avg">—</div></div>
  </div>

  <!-- CHART -->
  <div class="card">
    <div class="card-title">Наліт за останні місяці</div>
    <div class="chart" id="chart"></div>
  </div>

  <!-- LOG -->
  <div class="card">
    <div class="card-title">Усі записи</div>
    <div id="log"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'furia-flight-log-v1';   // записи нальоту в localStorage
const AUTH_KEY = 'furia-auth-v1';    // ознака входу в localStorage
const ACCESS_PIN = '4263';           /* ← ЗМІНІТЬ PIN ТУТ */
const DEFAULT_FILE = 'data.json';    // файл для збереження за замовчуванням

let entries = [];
let fileHandle = null;   // підключений зовнішній JSON-файл (File System Access API)
let lastSyncTxt = '';    // час останнього запису у файл

document.getElementById('in-date').valueAsDate = new Date();

function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast' + (isErr ? ' err' : ''), 2400);
}

function fmtHM(min) {
  const h = Math.floor(min / 60), m = min % 60;
  if (h === 0) return min + '<small> хв</small>';
  return h + '<small>год </small>' + m + '<small>хв</small>';
}

/* ---- Сховище: localStorage у форматі JSON ---- */
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    entries = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(entries)) entries = [];
  } catch (e) { entries = []; }
  render();
}
function save() {
  try {
    localStorage.setItem(KEY, JSON.stringify(entries));
    return true;
  } catch (e) {
    toast('Помилка збереження: ' + (e.message || e), true);
    return false;
  }
}

function addEntry() {
  const date = document.getElementById('in-date').value;
  const min = parseInt(document.getElementById('in-min').value, 10);
  const note = document.getElementById('in-note').value.trim();
  if (!date) { toast('Вкажіть дату', true); return; }
  if (!min || min <= 0) { toast('Вкажіть хвилини нальоту', true); return; }
  entries.push({ id: Date.now(), date, min, note });
  entries.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  if (persist()) {
    document.getElementById('in-min').value = '';
    document.getElementById('in-note').value = '';
    toast('Запис збережено');
    render();
  }
}

function delEntry(id) {
  entries = entries.filter(e => e.id !== id);
  if (persist()) { toast('Запис видалено'); render(); }
}

function resetAll() {
  if (!confirm('Видалити ВСІ записи нальоту? Дію не можна скасувати.\n\nПорада: спочатку зробіть експорт JSON для резервної копії.')) return;
  entries = [];
  persist();
  toast('Дані очищено');
  render();
}

/* ---- Експорт / Імпорт JSON ---- */
function exportJSON() {
  if (!entries.length) { toast('Немає даних для експорту', true); return; }
  const payload = { app: 'furia-flight-log', version: 1, exported: new Date().toISOString(), entries };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = 'naliot_' + stamp + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Файл експортовано');
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const list = Array.isArray(data) ? data : data.entries;
      if (!Array.isArray(list)) throw new Error('невірний формат');
      const valid = list.filter(e => e && e.date && Number.isFinite(+e.min))
                        .map(e => ({ id: e.id || Date.now() + Math.random(), date: e.date, min: +e.min, note: e.note || '' }));
      const merge = confirm('OK — додати до наявних записів.\nСкасувати — замінити всі дані імпортованими.');
      if (merge) {
        const seen = new Set(entries.map(e => e.date + '|' + e.min + '|' + e.note));
        valid.forEach(e => { const k = e.date + '|' + e.min + '|' + e.note; if (!seen.has(k)) { entries.push(e); seen.add(k); } });
      } else {
        entries = valid;
      }
      entries.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
      persist();
      toast('Імпортовано записів: ' + valid.length);
      render();
    } catch (e) {
      toast('Не вдалося прочитати файл: ' + (e.message || e), true);
    }
  };
  reader.readAsText(file);
}

function weekStart() {
  const d = new Date();
  const day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day);
  d.setHours(0, 0, 0, 0);
  return d;
}

function render() {
  const total = entries.reduce((s, e) => s + e.min, 0);
  const count = entries.length;
  const ws = weekStart();
  const week = entries.filter(e => new Date(e.date + 'T00:00:00') >= ws).reduce((s, e) => s + e.min, 0);
  const avg = count ? Math.round(total / count) : 0;

  document.getElementById('s-total').innerHTML = count ? fmtHM(total) : '0';
  document.getElementById('s-count').innerHTML = count;
  document.getElementById('s-week').innerHTML = fmtHM(week);
  document.getElementById('s-avg').innerHTML = count ? fmtHM(avg) : '0';

  const byMonth = {};
  entries.forEach(e => { const m = e.date.slice(0, 7); byMonth[m] = (byMonth[m] || 0) + e.min; });
  const months = [];
  const now = new Date();
  const names = ['січ','лют','бер','кві','тра','чер','лип','сер','вер','жов','лис','гру'];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    months.push({ label: names[d.getMonth()], val: byMonth[key] || 0 });
  }
  const max = Math.max(...months.map(m => m.val), 1);
  document.getElementById('chart').innerHTML = months.map(m => `
    <div class="bar-col">
      <div class="bar" style="height:${(m.val / max * 100)}%" data-val="${m.val}"></div>
      <div class="bar-label">${m.label}</div>
    </div>`).join('');

  const log = document.getElementById('log');
  if (!count) {
    log.innerHTML = '<div class="empty">Ще немає записів. Додайте перший наліт вище.</div>';
    return;
  }
  log.innerHTML = entries.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    const ds = String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
    return `<div class="log-item">
      <div class="log-date">${ds}</div>
      <div class="log-min">${e.min} хв</div>
      <div class="log-note">${e.note ? escapeHtml(e.note) : '<span style="color:#555">—</span>'}</div>
      <button class="log-del" data-id="${e.id}" title="Видалити">✕</button>
    </div>`;
  }).join('');
  log.querySelectorAll('.log-del').forEach(b => b.addEventListener('click', () => delEntry(Number(b.dataset.id))));
}

function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

/* ============ Автентифікація (PIN) ============ */
function isLoggedIn() { return localStorage.getItem(AUTH_KEY) === 'ok'; }

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.add('hidden');
  setTimeout(() => { const p = document.getElementById('pin-input'); if (p) p.focus(); }, 50);
}
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
}
function tryLogin() {
  const pin = document.getElementById('pin-input').value.trim();
  if (pin === ACCESS_PIN) {
    localStorage.setItem(AUTH_KEY, 'ok');   // запам'ятати, що користувач залогінений
    document.getElementById('login-err').textContent = '';
    document.getElementById('pin-input').value = '';
    enterApp();
  } else {
    document.getElementById('login-err').textContent = 'Невірний PIN';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  }
}
function logout() {
  localStorage.removeItem(AUTH_KEY);
  fileHandle = null; lastSyncTxt = '';
  showLogin();
}
async function enterApp() {
  showApp();
  load();                     // дані з localStorage
  await restoreFileHandle();  // спроба відновити підключений зовнішній файл
}

/* ============ IndexedDB — пам'ятає дозвіл доступу до файлу між сесіями ============ */
function idbStore(mode) {
  return new Promise((res, rej) => {
    const open = indexedDB.open('furia-fs', 1);
    open.onupgradeneeded = () => open.result.createObjectStore('handles');
    open.onsuccess = () => res(open.result.transaction('handles', mode).objectStore('handles'));
    open.onerror = () => rej(open.error);
  });
}
function idbGet(key) {
  return idbStore('readonly').then(s => new Promise((res, rej) => {
    const r = s.get(key); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  }));
}
function idbSet(key, val) {
  return idbStore('readwrite').then(s => new Promise((res, rej) => {
    const r = s.put(val, key); r.onsuccess = () => res(); r.onerror = () => rej(r.error);
  }));
}
function idbDel(key) {
  return idbStore('readwrite').then(s => new Promise((res, rej) => {
    const r = s.delete(key); r.onsuccess = () => res(); r.onerror = () => rej(r.error);
  }));
}

/* ============ Зовнішній JSON-файл (File System Access API) ============ */
function fsSupported() { return 'showOpenFilePicker' in window && 'showSaveFilePicker' in window; }

function normalizeEntries(list) {
  return list.filter(e => e && e.date && Number.isFinite(+e.min))
             .map(e => ({ id: e.id || Date.now() + Math.random(), date: e.date, min: +e.min, note: e.note || '' }));
}

function setSyncBtns(visible) {
  ['sync-open', 'sync-new', 'sync-grant', 'sync-disconnect'].forEach(id => {
    document.getElementById(id).style.display = visible.includes(id) ? '' : 'none';
  });
}
function updateSyncStatus(state) {
  const el = document.getElementById('sync-status');
  document.getElementById('sync-card').classList.toggle('needs-action', state === 'disconnected' || state === 'need-permission');
  switch (state) {
    case 'unsupported':
      el.innerHTML = '<span class="warn">Цей браузер не підтримує прямий доступ до файлів.</span><br>Дані зберігаються в localStorage. Для перенесення скористайтесь Експорт / Імпорт. Найкраще працює у Chrome або Edge.';
      setSyncBtns([]); break;
    case 'disconnected':
      el.innerHTML = 'Автозбереження у файл <b>вимкнено</b>. Натисніть <b>«🔗 Підключити ' + DEFAULT_FILE + '»</b> і виберіть <b>' + DEFAULT_FILE + '</b> з теки застосунку — далі всі зміни зберігатимуться туди автоматично.';
      setSyncBtns(['sync-open', 'sync-new']); break;
    case 'connected':
      el.innerHTML = '<span class="ok">● Автозбереження у файл:</span> <b>' + escapeHtml(fileHandle ? fileHandle.name : '') + '</b>' + (lastSyncTxt ? '<br><span style="color:var(--txt-dim)">Останній запис: ' + lastSyncTxt + '</span>' : '');
      setSyncBtns(['sync-disconnect']); break;
    case 'need-permission':
      el.innerHTML = '<span class="warn">Файл <b>' + escapeHtml(fileHandle ? fileHandle.name : DEFAULT_FILE) + '</b> підключено, але браузер просить підтвердити доступ.</span><br>Натисніть «🔓 Відновити доступ», щоб увімкнути автозбереження.';
      setSyncBtns(['sync-grant', 'sync-disconnect']); break;
    case 'error':
      el.innerHTML = '<span class="bad">Помилка запису у файл.</span> Перевірте доступ або підключіть файл знову.';
      setSyncBtns(['sync-disconnect', 'sync-open']); break;
  }
}

async function syncToFile() {
  if (!fileHandle) return false;
  try {
    const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') { updateSyncStatus('need-permission'); return false; }
    const payload = { app: 'furia-flight-log', version: 1, exported: new Date().toISOString(), entries };
    const w = await fileHandle.createWritable();
    await w.write(JSON.stringify(payload, null, 2));
    await w.close();
    lastSyncTxt = new Date().toLocaleTimeString('uk-UA');
    updateSyncStatus('connected');
    return true;
  } catch (e) {
    toast('Не вдалося записати у файл: ' + (e.message || e), true);
    updateSyncStatus('error');
    return false;
  }
}

async function loadFromFile() {
  const file = await fileHandle.getFile();
  const text = (await file.text()).trim();
  let fileEntries = [];
  if (text) {
    const data = JSON.parse(text);
    const list = Array.isArray(data) ? data : data.entries;
    if (!Array.isArray(list)) throw new Error('невірний формат файлу');
    fileEntries = normalizeEntries(list);
  }
  if (fileEntries.length === 0 && entries.length > 0) {
    await syncToFile();   // файл порожній, а в застосунку вже є дані — заповнити файл ними
    return;
  }
  entries = fileEntries;
  entries.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  save();   // кеш у localStorage
  render();
}

async function connectExisting() {
  if (!fsSupported()) { toast('Браузер не підтримує доступ до файлів', true); return; }
  try {
    const [handle] = await window.showOpenFilePicker({
      multiple: false,
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
    });
    fileHandle = handle;
    await loadFromFile();
    await idbSet('fileHandle', handle);
    updateSyncStatus('connected');
    toast('Файл підключено: ' + handle.name);
  } catch (e) {
    if (e.name === 'AbortError') return;
    fileHandle = null;
    toast('Не вдалося підключити файл: ' + (e.message || e), true);
    updateSyncStatus('disconnected');
  }
}

async function createNew() {
  if (!fsSupported()) { toast('Браузер не підтримує доступ до файлів', true); return; }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: DEFAULT_FILE,
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
    });
    fileHandle = handle;
    if (await syncToFile()) {
      await idbSet('fileHandle', handle);
      toast('Файл створено: ' + handle.name);
    }
  } catch (e) {
    if (e.name === 'AbortError') return;
    fileHandle = null;
    toast('Не вдалося створити файл: ' + (e.message || e), true);
    updateSyncStatus('disconnected');
  }
}

async function disconnectFile() {
  fileHandle = null;
  lastSyncTxt = '';
  try { await idbDel('fileHandle'); } catch (e) {}
  updateSyncStatus('disconnected');
  toast('Файл відключено (дані лишилися в localStorage)');
}

async function restoreFileHandle() {
  if (!fsSupported()) { updateSyncStatus('unsupported'); return; }
  let handle = null;
  try { handle = await idbGet('fileHandle'); } catch (e) {}
  if (!handle) { updateSyncStatus('disconnected'); return; }
  fileHandle = handle;
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      await loadFromFile();
      updateSyncStatus('connected');
    } else {
      updateSyncStatus('need-permission');
    }
  } catch (e) {
    updateSyncStatus('need-permission');
  }
}

async function reconnectPermission() {
  if (!fileHandle) { updateSyncStatus('disconnected'); return; }
  try {
    const perm = await fileHandle.requestPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      await loadFromFile();
      updateSyncStatus('connected');
      toast('Доступ до файлу відновлено');
    } else {
      toast('Дозвіл не надано', true);
      updateSyncStatus('need-permission');
    }
  } catch (e) {
    toast('Помилка доступу: ' + (e.message || e), true);
  }
}

/* ---- Запис змін: localStorage + зовнішній файл ---- */
function persist() {
  const ok = save();      // localStorage (синхронно)
  if (ok) syncToFile();   // зовнішній файл (асинхронно, якщо підключений)
  return ok;
}

/* ============ Прив'язка подій ============ */
document.getElementById('login-btn').addEventListener('click', tryLogin);
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('logout-btn').addEventListener('click', logout);

document.getElementById('add-btn').addEventListener('click', addEntry);
document.getElementById('reset-btn').addEventListener('click', resetAll);
document.getElementById('export-btn').addEventListener('click', exportJSON);
document.getElementById('import-btn').addEventListener('click', () => document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', e => { if (e.target.files[0]) { importJSON(e.target.files[0]); e.target.value = ''; } });
document.getElementById('in-min').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

document.getElementById('sync-open').addEventListener('click', connectExisting);
document.getElementById('sync-new').addEventListener('click', createNew);
document.getElementById('sync-grant').addEventListener('click', reconnectPermission);
document.getElementById('sync-disconnect').addEventListener('click', disconnectFile);

/* ============ Старт ============ */
if (isLoggedIn()) enterApp(); else showLogin();
